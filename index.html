<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInWithPopup,signInWithRedirect,getRedirectResult,GoogleAuthProvider,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc,onSnapshot,getDoc}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCf8YVpGcKsv5jVS_Sil-huIALbGPbuP7c",
  authDomain: "checkingapp-9f160.firebaseapp.com",
  projectId: "checkingapp-9f160",
  storageBucket: "checkingapp-9f160.firebasestorage.app",
  messagingSenderId: "960468279049",
  appId: "1:960468279049:web:05ec7ab471e2d1805fbdd8"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

window._fbAuth=auth;
window._fbDb=db;
window._fbProvider=provider;
window._fbSignIn=()=>{
  // Try popup first, fall back to redirect on mobile
  signInWithPopup(auth,provider).catch(()=>signInWithRedirect(auth,provider));
};
window._fbSignOut=()=>signOut(auth);
window._fbOnAuth=cb=>onAuthStateChanged(auth,cb);
window._fbSave=async(uid,data)=>{
  if(!data)return;
  await setDoc(doc(db,"users",uid),{state:JSON.stringify(data),updatedAt:Date.now()});
};
window._fbLoad=async uid=>{
  try{
    const snap=await getDoc(doc(db,"users",uid));
    if(snap.exists()&&snap.data().state){
      const p=JSON.parse(snap.data().state);
      if(p&&p.owner)return p;
    }
  }catch(e){}
  return null;
};
window._fbListen=(uid,cb)=>onSnapshot(doc(db,"users",uid),snap=>{
  if(snap.exists()&&snap.data().state){
    try{const p=JSON.parse(snap.data().state);if(p&&p.owner)cb(p,snap.data().updatedAt||0);}catch(e){}
  }
});

// Handle redirect result on page load
getRedirectResult(auth).catch(()=>{});

window._fbReady=true;
window.dispatchEvent(new Event("fbready"));
</script>

function GBox({title,right,t,children}){

    d({style:{height:5,background:`linear-gradient(135deg,${t.h2},${t.h1})`}})
  );

function Spark({data,color,ht=40}){
  if(!data||data.length<2)return null;
  const W=300,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>((i/(data.length-1))*W).toFixed(1)+","+(ht-4-((v-mn)/rng)*(ht-8)).toFixed(1)).join(" ");
  const uid="sp"+color.replace("#","");
  const last=data[data.length-1],ly=ht-4-((last-mn)/rng)*(ht-8);
  return e("svg",{viewBox:`0 0 ${W} ${ht}`,style:{display:"block",width:"100%",height:ht}},
    e("defs",null,e("linearGradient",{id:uid,x1:"0",y1:"0",x2:"0",y2:"1"},
      e("stop",{offset:"0%",stopColor:color,stopOpacity:0.4}),
      e("stop",{offset:"100%",stopColor:color,stopOpacity:0.03})
    )),
    e("polygon",{points:`0,${ht} ${pts} ${W},${ht}`,fill:`url(#${uid})`}),
    e("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinejoin:"round",strokeLinecap:"round"}),
    e("circle",{cx:W,cy:ly,r:"3",fill:color})
  );
}

  const [sav,setSav]=useState("");
  const [err,setErr]=useState("");
  const is={background:t.panel2,color:t.text,border:`1px solid ${t.border}60`,borderRadius:12,padding:"12px 14px",fontSize:15,outline:"none",width:"100%",fontFamily:"inherit"};
  const go=()=>{
    if(!name.trim()){setErr("Please enter your name.");return;}
    const c=parseFloat(chk)||0,sv=parseFloat(sav)||0,now=Date.now(),ledger=[];
    if(c>0)ledger.push({id:1,when:now,type:"DEPOSIT",amount:c,category:"INCOME",note:"Opening balance",postBalance:c});
    onDone({owner:name.trim(),accountNum:digits.trim()||"0000",checking:c,savings:sv,nextId:ledger.length+1,ledger,balanceHistory:[c]});
  };
  const field=(lbl,el)=>d({style:{display:"flex",flexDirection:"column",gap:8}},d({style:{color:t.accent,fontWeight:800,fontSize:11,letterSpacing:"0.12em"}},lbl),el);
  return d({style:{minHeight:"100vh",background:t.panel2,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px 20px",fontFamily:"system-ui,sans-serif"}},
    d({style:{width:"100%",maxWidth:420}},
      d({style:{textAlign:"center",marginBottom:28}},
        d({style:{fontSize:54,marginBottom:10}},"🏦"),
        d({style:{color:"#fff",fontWeight:900,fontSize:22,letterSpacing:"0.04em"}},"CHECKING ACCOUNT"),
        d({style:{color:t.muted,fontSize:13,marginTop:6}},"Enter your details to get started")
      ),
      err&&d({style:{background:t.bad+"22",color:t.bad,border:`1px solid ${t.bad}60`,borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,marginBottom:14}},"⚠ "+err),
      d({style:{background:t.panel,borderRadius:18,padding:24,border:`1px solid ${t.border}40`,boxShadow:"0 8px 40px #00000080",display:"flex",flexDirection:"column",gap:16}},
        field("YOUR NAME",inp({placeholder:"e.g. Jamie Smith",value:name,onChange:ev=>setName(ev.target.value),style:is,autoFocus:true,onKeyDown:ev=>ev.key==="Enter"&&go()})),
        field(e(Fragment,null,"ACCOUNT LAST 4 ",s({style:{color:t.muted,fontWeight:400}},"(optional)")),inp({placeholder:"e.g. 4821",maxLength:4,value:digits,onChange:ev=>setDigits(ev.target.value.replace(/\D/g,"")),style:is})),
        field("CURRENT CHECKING BALANCE",inp({type:"number",placeholder:"0.00",min:"0",step:"0.01",value:chk,onChange:ev=>setChk(ev.target.value),style:is})),
        field(e(Fragment,null,"SAVINGS BALANCE ",s({style:{color:t.muted,fontWeight:400}},"(optional)")),inp({type:"number",placeholder:"0.00",min:"0",step:"0.01",value:sav,onChange:ev=>setSav(ev.target.value),style:is})),
        b({onClick:go,style:{width:"100%",padding:"15px 0",borderRadius:14,fontWeight:900,fontSize:16,color:"#fff",cursor:"pointer",border:"none",background:`linear-gradient(135deg,${t.h1},${t.h2})`,boxShadow:`0 4px 20px ${t.accent}50`,marginTop:4}},"Get Started →")
      ),
      d({style:{textAlign:"center",color:t.muted,fontSize:11,marginTop:14}},"All data syncs to your Google account.")
    )
  );
}

function App(){
  const [user,setUser]=useState(undefined); // undefined=loading, null=signed out
  const [st,setSt]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [screen,setScreen]=useState("dashboard");
  const [tid,setTid]=useState(ldTid);
  const [undos,setUndos]=useState([]);
  const [redos,setRedos]=useState([]);
  const [search,setSearch]=useState("");
  const [showTheme,setShowTheme]=useState(false);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState({type:"DEPOSIT",amount:"",category:"INCOME",note:""});
  const [formErr,setFormErr]=useState("");
  const [editOwner,setEditOwner]=useState(false);
  const [ownerDraft,setOwnerDraft]=useState("");
  const [editTx,setEditTx]=useState(null);
  const [fbReady,setFbReady]=useState(!!window._fbReady);
  const saveTimer=useRef(null);
  const listenUnsub=useRef(null);
  const T=THEMES[tid];

  // Wait for Firebase to load
  useEffect(()=>{
    if(fbReady)return;
    const h=()=>setFbReady(true);
    window.addEventListener("fbready",h);
    return()=>window.removeEventListener("fbready",h);
  },[fbReady]);

  // Auth listener
  useEffect(()=>{
    if(!fbReady||!window._fbOnAuth)return;
    return window._fbOnAuth(async u=>{
      setUser(u||null);
      if(u){
        // Load data from Firestore
        setSyncing(true);
        try{
          const remote=await window._fbLoad(u.uid);
          if(remote){setSt(remote);svSt(remote);}
          else{
            const local=ldSt();
            if(local){setSt(local);await window._fbSave(u.uid,local);}
          }
        }catch(err){const local=ldSt();if(local)setSt(local);}
        setSyncing(false);
        // Real-time listener - only update if remote is newer
        if(listenUnsub.current)listenUnsub.current();
        listenUnsub.current=window._fbListen(u.uid,(remote,remoteTs)=>{
          setSt(prev=>{
            if(!prev)return remote;
            const localTs=prev.updatedAt||0;
            if(remoteTs>localTs)return remote;
            return prev;
          });
        });
      }else{
        if(listenUnsub.current){listenUnsub.current();listenUnsub.current=null;}
        setSt(null);
      }
    });
  },[fbReady]);

  useEffect(()=>()=>{if(listenUnsub.current)listenUnsub.current();},[]);
  useEffect(()=>{svTid(tid);},[tid]);

  const saveToCloud=useCallback((data)=>{
    if(!user||!window._fbSave||!data)return;
    clearTimeout(saveTimer.current);
    const withTs={...data,updatedAt:Date.now()};
    svSt(withTs);
    saveTimer.current=setTimeout(()=>{
      window._fbSave(user.uid,withTs).catch(()=>{});
    },1000);
  },[user]);

  const setStAndSave=useCallback(updater=>{
    setSt(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(next)saveToCloud(next);
      return next;
    });
  },[saveToCloud]);

  const notify=useCallback((msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);},[]);
  const pushUndo=useCallback(x=>{setUndos(p=>[...p.slice(-49),x]);setRedos([]);},[]);
  const undo=()=>{if(!undos.length)return;setRedos(r=>[...r,st]);setStAndSave(undos[undos.length-1]);setUndos(u=>u.slice(0,-1));notify("Undo applied",false);};
  const redo=()=>{if(!redos.length)return;setUndos(u=>[...u,st]);setStAndSave(redos[redos.length-1]);setRedos(r=>r.slice(0,-1));notify("Redo applied",false);};

  // Loading screen
  if(user===undefined||(!fbReady&&!st)){
    return d({style:{minHeight:"100vh",background:"#0f0f23",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},
      d({style:{fontSize:48}},"🏦"),
      d({style:{color:"#00d7ff",fontWeight:700,fontSize:14}},syncing?"Syncing...":"Loading...")
    );
  }

  if(!user)return e(SignInScreen,{t:T});
  if(!st)return e(Setup,{t:T,onDone:x=>{setStAndSave(x);}});

  const recalcBalances=(ledger)=>{
    let chk=0,sv=st.savings;
    return ledger.map(tx=>{
      if(tx.type==="DEPOSIT")   chk+=tx.amount;
      if(tx.type==="WITHDRAWAL")chk-=tx.amount;
      if(tx.type==="XFER-OUT") {chk-=tx.amount;sv+=tx.amount;}
      if(tx.type==="XFER-IN")  {chk+=tx.amount;sv-=tx.amount;}
      return{...tx,postBalance:chk};
    });
  };

  const saveTx=updated=>{
    pushUndo(st);
    setStAndSave(prev=>{
      const idx=prev.ledger.findIndex(t=>t.id===updated.id);
      if(idx<0)return prev;
      const nl=[...prev.ledger];nl[idx]=updated;
      const rc=recalcBalances(nl);
      return{...prev,checking:rc.length?rc[rc.length-1].postBalance:prev.checking,ledger:rc,balanceHistory:rc.map(t=>t.postBalance).slice(-60)};
    });
    setEditTx(null);notify("Transaction updated!");
  };

  const deleteTx=id=>{
    pushUndo(st);
    setStAndSave(prev=>{
      const nl=prev.ledger.filter(t=>t.id!==id);
      const rc=recalcBalances(nl);
      return{...prev,checking:rc.length?rc[rc.length-1].postBalance:0,ledger:rc,balanceHistory:rc.map(t=>t.postBalance).slice(-60)};
    });
    setEditTx(null);notify("Transaction deleted!");
  };

  const submitTx=()=>{
    const amt=parseFloat(form.amount);
    if(!amt||amt<=0){setFormErr("Enter a valid positive amount.");return;}
    if((form.type==="WITHDRAWAL"||form.type==="XFER-OUT")&&amt>st.checking+1e-9){setFormErr("Insufficient checking funds.");return;}
    if(form.type==="XFER-IN"&&amt>st.savings+1e-9){setFormErr("Insufficient savings funds.");return;}
    pushUndo(st);
    setStAndSave(prev=>{
      let chk=prev.checking,sv=prev.savings;
      if(form.type==="DEPOSIT")   chk+=amt;
      if(form.type==="WITHDRAWAL")chk-=amt;
      if(form.type==="XFER-OUT") {chk-=amt;sv+=amt;}
      if(form.type==="XFER-IN")  {chk+=amt;sv-=amt;}
      const tx={id:prev.nextId,when:Date.now(),type:form.type,amount:amt,category:form.category||"UNCAT",note:form.note,postBalance:chk};
      return{...prev,checking:chk,savings:sv,nextId:prev.nextId+1,ledger:[...prev.ledger,tx],balanceHistory:[...prev.balanceHistory,chk].slice(-60)};
    });
    setForm({type:"DEPOSIT",amount:"",category:"INCOME",note:""});
    setFormErr("");notify("Transaction recorded!");setScreen("dashboard");
  };

  const exportCSV=()=>{
    const rows=["id,date,type,amount,balance,category,note",...st.ledger.map(tx=>`${tx.id},"${fFull(tx.when)}",${tx.type},${tx.amount.toFixed(2)},${tx.postBalance.toFixed(2)},"${tx.category}","${(tx.note||"").replace(/"/g,'\\"')}"`
    )];
    const a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));
    a.download="ledger.csv";a.click();notify("CSV exported!");
  };

  const resetApp=()=>{
    if(!window.confirm("Delete ALL data and start fresh?"))return;
    localStorage.removeItem(SK);
    if(user&&window._fbSave)window._fbSave(user.uid,null).catch(()=>{});
    setSt(null);setUndos([]);setRedos([]);
  };

  const importCSV=ev=>{
    const file=ev.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=r=>{
      try{
        const lines=r.target.result.trim().split("\n");
        const imported=[];
        for(let i=1;i<lines.length;i++){
          const row=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];
          const cl=v=>(v||"").replace(/^"|"$/g,"").trim();
          const amt=parseFloat(cl(row[3]))||0;
          if(amt>0)imported.push({id:parseInt(cl(row[0]))||i,when:new Date(cl(row[1])).getTime()||Date.now(),type:cl(row[2])||"WITHDRAWAL",amount:amt,postBalance:parseFloat(cl(row[4]))||0,category:(cl(row[5])||"UNCAT").toUpperCase(),note:cl(row[6])||""});
        }
        if(!imported.length){notify("No valid rows found.",false);return;}
        if(!window.confirm(`Import ${imported.length} transactions? This will REPLACE your current ledger.`)){ev.target.value="";return;}
        pushUndo(st);
        setStAndSave(prev=>({...prev,checking:imported[imported.length-1].postBalance,nextId:imported.length+1,ledger:imported,balanceHistory:imported.map(t=>t.postBalance).slice(-60)}));
        notify(`Imported ${imported.length} transactions!`);setScreen("dashboard");
      }catch(err){notify("Import failed.",false);}
      ev.target.value="";
    };
    reader.readAsText(file);
  };

  const totalIn =st.ledger.filter(t=>t.type==="DEPOSIT"||t.type==="XFER-IN").reduce((a,t)=>a+t.amount,0);
  const totalOut=st.ledger.filter(t=>t.type==="WITHDRAWAL"||t.type==="XFER-OUT").reduce((a,t)=>a+t.amount,0);
  const catSpend={};
  st.ledger.filter(t=>t.type==="WITHDRAWAL").forEach(t=>{catSpend[t.category]=(catSpend[t.category]||0)+t.amount;});
  const topCats=Object.entries(catSpend).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const filtered=[...st.ledger].reverse().filter(t=>!search||t.category.toLowerCase().includes(search.toLowerCase())||(t.note||"").toLowerCase().includes(search.toLowerCase()));
  const is={background:T.panel2,color:T.text,border:`1px solid ${T.border}60`,borderRadius:12,padding:"11px 14px",fontSize:14,outline:"none",width:"100%",fontFamily:"inherit",boxSizing:"border-box"};

  const Tab=({id,label,icon})=>{
    const act=screen===id;
    return b({onClick:()=>setScreen(id),style:{flex:1,padding:"9px 4px",border:"none",cursor:"pointer",background:act?`linear-gradient(135deg,${T.h1},${T.h2})`:T.panel2,color:act?"#fff":T.muted,fontWeight:700,fontSize:11,letterSpacing:"0.04em",borderTop:act?`2px solid ${T.accent}`:"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3,boxShadow:act?`inset 0 -2px 8px ${T.accent}30`:"none"}},
      s({style:{fontSize:18}},icon),label
    );
  };

  return d({className:"app-shell",style:{minHeight:"100vh",background:T.panel2,color:T.text,fontFamily:"system-ui,sans-serif",position:"relative"}},
    toast&&d({style:{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:9999,pointerEvents:"none",background:`linear-gradient(135deg,${T.h1},${T.h2})`,border:`1.5px solid ${toast.ok?T.good:T.warn}`,borderRadius:12,padding:"10px 22px",color:"#fff",fontWeight:700,fontSize:13,boxShadow:"0 8px 32px #00000080",whiteSpace:"nowrap"}},(toast.ok?"✅ ":"↩ ")+toast.msg),
    inp({type:"file",id:"csvImport",accept:".csv",onChange:importCSV,style:{display:"none"}}),
    editTx&&e(EditModal,{tx:editTx,t:T,onSave:saveTx,onDelete:deleteTx,onClose:()=>setEditTx(null)}),

    // HEADER
    d({className:"app-header",style:{background:`linear-gradient(135deg,${T.h1} 0%,${T.h2} 60%,${T.h1} 100%)`,padding:"16px 18px 14px",boxShadow:"0 4px 24px #00000060",position:"sticky",top:0,zIndex:100}},
      d({style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        d({style:{display:"flex",alignItems:"center",gap:12}},
          d({style:{width:44,height:44,borderRadius:12,background:"rgba(0,0,0,0.3)",border:`2px solid ${T.accent}60`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:22}},"🏦"),
          d(null,
            d({style:{color:"#fff",fontWeight:900,fontSize:17,letterSpacing:"0.03em"}},"CHECKING ACCOUNT"),
            d({style:{color:"rgba(255,255,255,0.65)",fontSize:11}},
              editOwner
                ? s({style:{display:"flex",gap:6,alignItems:"center"}},
                    inp({value:ownerDraft,onChange:ev=>setOwnerDraft(ev.target.value),style:{background:"rgba(0,0,0,0.3)",border:`1px solid ${T.accent}`,borderRadius:6,color:"#fff",padding:"2px 6px",fontSize:11,outline:"none",width:120},autoFocus:true,onKeyDown:ev=>{if(ev.key==="Enter"){setStAndSave(p=>({...p,owner:ownerDraft}));setEditOwner(false);}}}),
                    b({onClick:()=>{setStAndSave(p=>({...p,owner:ownerDraft}));setEditOwner(false);},style:{background:T.good,border:"none",borderRadius:5,padding:"2px 8px",fontWeight:700,fontSize:11,cursor:"pointer"}},"✓"),
                    b({onClick:()=>setEditOwner(false),style:{background:"transparent",border:"none",color:"rgba(255,255,255,0.5)",fontSize:16,cursor:"pointer"}},"✕")
                  )
                : s({onClick:()=>{setOwnerDraft(st.owner);setEditOwner(true);},style:{cursor:"pointer"}},`${st.owner} · ****${st.accountNum} ✏️`)
            )
          )
        ),
        d({style:{display:"flex",gap:6,alignItems:"center"}},
          syncing&&s({style:{color:"rgba(255,255,255,0.6)",fontSize:10}},"☁ syncing…"),
          b({onClick:()=>setShowTheme(p=>!p),style:{background:"rgba(0,0,0,0.3)",border:`1px solid ${T.accent}60`,color:"#fff",borderRadius:10,padding:"6px 12px",fontWeight:700,fontSize:11,cursor:"pointer"}},"🎨"),
          b({onClick:()=>window._fbSignOut&&window._fbSignOut(),style:{background:"rgba(0,0,0,0.3)",border:`1px solid rgba(255,255,255,0.2)`,color:"rgba(255,255,255,0.7)",borderRadius:10,padding:"6px 10px",fontWeight:700,fontSize:10,cursor:"pointer"}},"Sign out")
        )
      ),
      d({style:{display:"flex",gap:8}},
        [["↩",undo,!undos.length,"Undo"],["↪",redo,!redos.length,"Redo"],["📥",exportCSV,false,"Export"],["📤",()=>document.getElementById("csvImport").click(),false,"Import"],["🗑",resetApp,false,"Reset"]].map(([ic,fn,dis,lb])=>
          b({key:lb,onClick:fn,disabled:dis,style:{flex:1,background:"rgba(0,0,0,0.28)",border:`1px solid rgba(255,255,255,${dis?0.1:0.3})`,color:dis?"rgba(255,255,255,0.25)":"#fff",borderRadius:9,padding:"6px 2px",fontWeight:700,fontSize:10,cursor:dis?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:3}},
            s({style:{fontSize:13}},ic),lb
          )
        )
      )
    ),

    showTheme&&d({style:{margin:"10px 14px",background:T.panel,borderRadius:16,padding:16,border:`1px solid ${T.border}60`,boxShadow:"0 8px 32px #00000060"}},
      d({style:{color:T.accent,fontWeight:900,fontSize:11,letterSpacing:"0.14em",marginBottom:10}},"SELECT THEME"),
      d({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}},
        THEMES.map((th,i)=>b({key:i,onClick:()=>{setTid(i);setShowTheme(false);},style:{background:`linear-gradient(135deg,${th.h1},${th.h2})`,border:i===tid?"2.5px solid #fff":"1.5px solid transparent",borderRadius:10,padding:"8px 10px",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",textAlign:"left",boxShadow:i===tid?`0 0 14px ${th.accent}`:"none"}},th.name))
      )
    ),

    d({className:"bal-cards",style:{display:"flex",gap:10,padding:"14px 14px 4px"}},
      e(BalCard,{label:"Checking",value:st.checking,icon:"💳",color:T.good,t:T,spark:st.balanceHistory}),
      e(BalCard,{label:"Savings", value:st.savings, icon:"🏦",color:T.accent,t:T})
    ),

    // SIDE NAV (desktop only)
    d({className:"app-sidenav",style:{background:T.panel}},
      d({style:{color:T.accent,fontWeight:900,fontSize:10,letterSpacing:"0.14em",marginBottom:8,padding:"0 8px"}},"NAVIGATION"),
      ...[["dashboard","\u{1F3E0}","Home"],["ledger","\u{1F4CB}","Ledger"],["new-tx","\u2795","New Transaction"],["analytics","\u{1F4CA}","Analytics"],["search","\u{1F50D}","Search"]].map(([id,icon,label])=>{
        const act=screen===id;
        return b({key:id,onClick:()=>setScreen(id),style:{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderRadius:12,border:"none",cursor:"pointer",width:"100%",textAlign:"left",background:act?"linear-gradient(135deg,"+T.h1+","+T.h2+")":`transparent`,color:act?"#fff":T.muted,fontWeight:700,fontSize:14,marginBottom:2}},
          s({style:{fontSize:20}},icon),label
        );
      }),
      d({style:{marginTop:24,paddingTop:16,borderTop:"1px solid "+T.border+"30",display:"flex",flexDirection:"column",gap:4}}),
      d({style:{color:T.muted,fontSize:11,padding:"0 8px"}},"Signed in as"),
      d({style:{color:T.text,fontSize:12,fontWeight:700,padding:"4px 8px 10px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(user&&user.email)||""),
      b({onClick:()=>window._fbSignOut&&window._fbSignOut(),style:{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",borderRadius:10,border:"1px solid "+T.border+"40",cursor:"pointer",width:"100%",background:"transparent",color:T.muted,fontWeight:700,fontSize:13}},
        "\u{1F6AA} Sign Out"
      )
    ),
    
    d({className:"app-content",style:{padding:"10px 14px 90px",minHeight:"60vh"}},
      screen==="dashboard"&&e(Fragment,null,
        d({style:{display:"flex",gap:10,marginBottom:14}},
          [["Money In",totalIn,T.good,"⬆"],["Money Out",totalOut,T.bad,"⬇"],["Net",totalIn-totalOut,totalIn-totalOut>=0?T.good:T.bad,"≈"]].map(([lb,val,col,ic])=>
            d({key:lb,style:{flex:1,borderRadius:14,overflow:"hidden",border:`1px solid ${col}40`,boxShadow:"0 2px 12px #00000050"}},
              d({style:{background:`linear-gradient(135deg,${T.h1},${T.h2})`,padding:"5px 10px"}},s({style:{color:"rgba(255,255,255,0.75)",fontSize:9,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}},lb)),
              d({style:{height:2,background:`linear-gradient(90deg,${col},transparent)`}}),
              d({style:{background:T.panel,padding:"8px 6px",textAlign:"center"}},d({style:{fontSize:14,fontWeight:900,color:col}},ic+" "+f$(val))),
              d({style:{height:3,background:`linear-gradient(135deg,${T.h2},${T.h1})`}})
            )
          )
        ),
        e(GBox,{title:"Recent Transactions",right:`${st.ledger.length} total`,t:T},
          ...[...st.ledger].reverse().slice(0,10).map((tx,i)=>e(TxRow,{key:tx.id,tx,i,t:T,onTap:()=>setEditTx(tx)})),
          st.ledger.length===0&&d({style:{padding:32,textAlign:"center",color:T.muted,fontSize:13,lineHeight:1.7}},"No transactions yet. Tap ➕ New to add one.")
        )
      ),
      screen==="ledger"&&e(GBox,{title:"Full Ledger",right:"Most recent first",t:T},
        ...[...st.ledger].reverse().map((tx,i)=>e(TxRow,{key:tx.id,tx,i,t:T,onTap:()=>setEditTx(tx)})),
        st.ledger.length===0&&d({style:{padding:24,textAlign:"center",color:T.muted,fontSize:13}},"No transactions yet.")
      ),
      screen==="new-tx"&&e(GBox,{title:"New Transaction",t:T},
        d({style:{padding:"20px 18px"}},
          formErr&&d({style:{background:T.bad+"22",color:T.bad,border:`1px solid ${T.bad}60`,borderRadius:10,padding:"10px 14px",fontSize:13,fontWeight:700,marginBottom:16}},"⚠ "+formErr),
          d({style:{marginBottom:18}},
            d({style:{color:T.accent,fontWeight:800,fontSize:11,letterSpacing:"0.12em",marginBottom:10}},"TYPE"),
            d({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9}},
              [{val:"DEPOSIT",lbl:"Deposit",ic:"⬆",col:T.good},{val:"WITHDRAWAL",lbl:"Withdrawal",ic:"⬇",col:T.bad},{val:"XFER-OUT",lbl:"To Savings",ic:"→",col:T.warn},{val:"XFER-IN",lbl:"From Savings",ic:"←",col:T.accent}].map(({val,lbl,ic,col})=>{
                const act=form.type===val;
                return b({key:val,onClick:()=>setForm(p=>({...p,type:val})),style:{background:act?`linear-gradient(135deg,${T.h1},${T.h2})`:T.panel2,color:act?"#fff":col,border:act?`2px solid ${T.accent}`:`1.5px solid ${col}50`,borderRadius:13,padding:"13px 8px",fontWeight:700,fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:7,boxShadow:act?`0 0 16px ${T.accent}50`:"none"}},s({style:{fontSize:18}},ic),lbl);
              })
            )
          ),
          d({style:{marginBottom:14}},
            d({style:{color:T.accent,fontWeight:800,fontSize:11,letterSpacing:"0.12em",marginBottom:8}},"AMOUNT"),
            inp({type:"number",placeholder:"0.00",value:form.amount,min:"0",step:"0.01",onChange:ev=>setForm(p=>({...p,amount:ev.target.value})),style:{...is,fontSize:20,fontWeight:900,color:T.good}})
          ),
          d({style:{marginBottom:14}},
            d({style:{color:T.accent,fontWeight:800,fontSize:11,letterSpacing:"0.12em",marginBottom:8}},"CATEGORY"),
            d({style:{display:"flex",flexWrap:"wrap",gap:7}},
              CATS.map(c=>{
                const act=form.category===c,col=cc(c);
                return b({key:c,onClick:()=>setForm(p=>({...p,category:c})),style:{padding:"6px 12px",borderRadius:20,fontWeight:700,fontSize:11,cursor:"pointer",background:act?col+"30":T.panel2,color:act?col:T.muted,border:act?`1.5px solid ${col}`:`1px solid ${T.border}40`}},c);
              })
            )
          ),
          d({style:{marginBottom:22}},
            d({style:{color:T.accent,fontWeight:800,fontSize:11,letterSpacing:"0.12em",marginBottom:8}},e(Fragment,null,"NOTE ",s({style:{color:T.muted,fontWeight:400}},"(optional)"))),
            inp({type:"text",placeholder:"e.g. Grocery run, rent…",value:form.note,onChange:ev=>setForm(p=>({...p,note:ev.target.value})),style:is})
          ),
          b({onClick:submitTx,style:{width:"100%",padding:"15px 0",borderRadius:14,fontWeight:900,fontSize:16,color:"#fff",cursor:"pointer",border:"none",background:`linear-gradient(135deg,${T.h1},${T.h2})`,boxShadow:`0 4px 20px ${T.accent}50`}},"✅ Record Transaction")
        )
      ),
      screen==="analytics"&&e(Fragment,null,
        e(GBox,{title:"Financial Summary",t:T},
          d({style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,padding:16}},
            [["Inflow",totalIn,T.good],["Outflow",totalOut,T.bad],["Net",totalIn-totalOut,totalIn-totalOut>=0?T.good:T.bad]].map(([lb,val,col])=>
              d({key:lb,style:{textAlign:"center",padding:"12px 8px",borderRadius:12,background:T.panel2,border:`1px solid ${col}30`}},
                d({style:{color:T.muted,fontSize:10,letterSpacing:"0.1em",marginBottom:6}},lb),
                d({style:{color:col,fontWeight:900,fontSize:15}},f$(val))
              )
            )
          )
        ),
        e(GBox,{title:"Balance History",t:T},
          d({style:{padding:"14px 18px"}},
            e(Spark,{data:st.balanceHistory,color:T.good,ht:70}),
            d({style:{display:"flex",justifyContent:"space-between",fontSize:10,color:T.muted,marginTop:4}},s(null,"Oldest"),s(null,"Latest: "+f$(st.checking)))
          )
        ),
        e(GBox,{title:"Spending by Category",t:T},
          d({style:{padding:"14px 18px"}},
            ...topCats.map(([cat,amt])=>{
              const pct=totalOut>0?(amt/totalOut)*100:0,col=cc(cat);
              return d({key:cat,style:{marginBottom:14}},
                d({style:{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:5}},
                  s({style:{color:col,fontWeight:700}},cat),
                  s({style:{color:T.bad,fontWeight:700}},f$(amt)+" ",s({style:{color:T.muted,fontWeight:400}},`(${pct.toFixed(1)}%)`))
                ),
                d({style:{borderRadius:99,height:9,background:T.panel2,overflow:"hidden"}},
                  d({style:{height:"100%",width:pct+"%",borderRadius:99,background:`linear-gradient(90deg,${col},${col}70)`,boxShadow:`0 0 8px ${col}60`}})
                )
              );
            }),
            topCats.length===0&&d({style:{textAlign:"center",color:T.muted,fontSize:13,padding:16}},"No spending data yet.")
          )
        )
      ),
      screen==="search"&&e(GBox,{title:"Search Transactions",t:T},
        d({style:{padding:"14px 16px"}},
          inp({type:"text",placeholder:"Search by category or note…",value:search,onChange:ev=>setSearch(ev.target.value),style:{...is,marginBottom:12},autoFocus:true}),
          d({style:{fontSize:11,color:T.muted,marginBottom:10}},`${filtered.length} result(s)`),
          ...filtered.map((tx,i)=>e(TxRow,{key:tx.id,tx,i,t:T,onTap:()=>setEditTx(tx)})),
          filtered.length===0&&d({style:{padding:20,textAlign:"center",color:T.muted,fontSize:13}},"No results found.")
        )
      )
    ),

    d({className:"app-bottomnav",style:{position:"fixed",bottom:0,left:0,right:0,width:"100%",background:T.panel,borderTop:`2px solid ${T.border}40`,display:"flex",boxShadow:"0 -4px 20px #00000080",zIndex:200,paddingBottom:"env(safe-area-inset-bottom,0px)"}},
      e(Tab,{id:"dashboard",label:"Home",      icon:"🏠"}),
      e(Tab,{id:"ledger",   label:"Ledger",    icon:"📋"}),
      e(Tab,{id:"new-tx",   label:"New",       icon:"➕"}),
      e(Tab,{id:"analytics",label:"Analytics", icon:"📊"}),
      e(Tab,{id:"search",   label:"Search",    icon:"🔍"})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
})();
</script>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
}
</script>
</body>
</html>
