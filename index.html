    e("defs",null,e("linearGradient",{id:uid,x1:"0",y1:"0",x2:"0",y2:"1"},

function RecurringScreen({st,t,setStAndSave,notify}){
  const recurring=st.recurring||[];
  const [showForm,setShowForm]=useState(false);
  const [form,setForm]=useState({name:"",amount:"",category:"BILLS",freq:"monthly",type:"WITHDRAWAL",nextDate:""});
  const is={background:t.panel2,color:t.text,border:`1px solid ${t.border}50`,borderRadius:10,padding:"10px 12px",fontSize:13,outline:"none",width:"100%"};
  const addRec=()=>{
    const a=parseFloat(form.amount);
    if(!form.name.trim()||!a||a<=0)return;
    const rec={id:Date.now(),name:form.name,amount:a,category:form.category,freq:form.freq,type:form.type,nextDate:form.nextDate||new Date().toISOString().slice(0,10),active:true};
    setStAndSave(p=>({...p,recurring:[...(p.recurring||[]),rec]}));
    setForm({name:"",amount:"",category:"BILLS",freq:"monthly",type:"WITHDRAWAL",nextDate:""});
    setShowForm(false);notify("Recurring added!");
  };
  const toggleRec=id=>setStAndSave(p=>({...p,recurring:(p.recurring||[]).map(r=>r.id===id?{...r,active:!r.active}:r)}));
  const delRec=id=>{if(window.confirm("Remove this recurring?"))setStAndSave(p=>({...p,recurring:(p.recurring||[]).filter(r=>r.id!==id)}));};
  const applyRec=rec=>{
    setStAndSave(prev=>{
      let chk=prev.checking,sv=prev.savings;
      if(rec.type==="DEPOSIT")chk+=rec.amount;
      if(rec.type==="WITHDRAWAL")chk-=rec.amount;
      if(rec.type==="XFER-OUT"){chk-=rec.amount;sv+=rec.amount;}
      if(rec.type==="XFER-IN"){chk+=rec.amount;sv-=rec.amount;}
      const tx={id:prev.nextId,when:Date.now(),type:rec.type,amount:rec.amount,category:rec.category,note:rec.name+" (recurring)",postBalance:chk};
      const nd=new Date(rec.nextDate);
      if(rec.freq==="weekly")nd.setDate(nd.getDate()+7);
      else if(rec.freq==="biweekly")nd.setDate(nd.getDate()+14);
      else if(rec.freq==="monthly")nd.setMonth(nd.getMonth()+1);
      else if(rec.freq==="quarterly")nd.setMonth(nd.getMonth()+3);
      else if(rec.freq==="yearly")nd.setFullYear(nd.getFullYear()+1);
      return{...prev,checking:chk,savings:sv,nextId:prev.nextId+1,ledger:[...prev.ledger,tx],balanceHistory:[...prev.balanceHistory,chk].slice(-60),
        recurring:(prev.recurring||[]).map(r=>r.id===rec.id?{...r,nextDate:nd.toISOString().slice(0,10)}:r)};
    });
    notify("Applied!");
  };
  return e(GBox,{title:"Recurring Transactions",right:recurring.length+" set up",t},
    d({style:{padding:"12px 16px"}},
      recurring.length===0&&!showForm&&d({style:{textAlign:"center",color:t.muted,fontSize:13,padding:"20px 0"}},"No recurring transactions yet."),
      ...recurring.map((rec,i)=>{
        const col=cc(rec.category);const isIn=rec.type==="DEPOSIT"||rec.type==="XFER-IN";
        const today=new Date().toISOString().slice(0,10);const due=rec.nextDate<=today;
        return d({key:rec.id,style:{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${t.border}18`,opacity:rec.active?1:0.45}},
          d({style:{width:34,height:34,borderRadius:10,background:col+"18",border:`1px solid ${col}38`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0}},isIn?"💰":"💸"),
          d({style:{flex:1,minWidth:0}},
            d({style:{fontWeight:700,fontSize:12,color:t.text}},rec.name),
            d({style:{fontSize:10,color:t.muted,marginTop:2}},s({style:{color:col,fontWeight:700}},rec.category)," · "+rec.freq+" · ",s({style:{color:due&&rec.active?t.bad:t.muted,fontWeight:due?700:400}},"Next: "+rec.nextDate))
          ),
          d({style:{fontWeight:900,fontSize:12,color:isIn?t.good:t.bad,marginRight:6}},(isIn?"+":"-")+f$(rec.amount)),
          due&&rec.active&&b({onClick:()=>applyRec(rec),style:{background:`linear-gradient(135deg,${t.h1},${t.h2})`,border:"none",color:"#fff",borderRadius:7,padding:"4px 9px",fontSize:10,fontWeight:700,cursor:"pointer",marginRight:4}},"Apply"),
          b({onClick:()=>toggleRec(rec.id),style:{background:t.panel2,border:`1px solid ${t.border}35`,color:rec.active?t.good:t.muted,borderRadius:7,padding:"4px 7px",fontSize:10,cursor:"pointer",marginRight:3}},rec.active?"ON":"OFF"),
          b({onClick:()=>delRec(rec.id),style:{background:t.bad+"18",border:`1px solid ${t.bad}38`,color:t.bad,borderRadius:7,padding:"4px 7px",fontSize:10,cursor:"pointer"}},"✕")
        );
      }),
      showForm
        ? d({style:{marginTop:12,background:t.panel2,borderRadius:12,padding:14,display:"flex",flexDirection:"column",gap:10}},
            d({style:{color:t.accent,fontWeight:800,fontSize:10,letterSpacing:"0.12em"}},"NEW RECURRING"),
            inp({placeholder:"Name (e.g. Netflix)",value:form.name,onChange:ev=>setForm(p=>({...p,name:ev.target.value})),style:is}),
            d({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              inp({type:"number",placeholder:"Amount",value:form.amount,onChange:ev=>setForm(p=>({...p,amount:ev.target.value})),style:is}),
              e("select",{value:form.freq,onChange:ev=>setForm(p=>({...p,freq:ev.target.value})),style:is},
                ["weekly","biweekly","monthly","quarterly","yearly"].map(f=>e("option",{key:f,value:f},f.charAt(0).toUpperCase()+f.slice(1)))
              )
            ),
            d({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
              e("select",{value:form.type,onChange:ev=>setForm(p=>({...p,type:ev.target.value})),style:is},
                [{v:"WITHDRAWAL",l:"Withdrawal"},{v:"DEPOSIT",l:"Deposit"},{v:"XFER-OUT",l:"To Savings"},{v:"XFER-IN",l:"From Savings"}].map(({v,l})=>e("option",{key:v,value:v},l))
              ),
              e("select",{value:form.category,onChange:ev=>setForm(p=>({...p,category:ev.target.value})),style:is},
                CATS.map(c=>e("option",{key:c,value:c},c))
              )
            ),
            d({style:{display:"flex",flexDirection:"column",gap:4}},
              d({style:{color:t.muted,fontSize:10}},"Next due date"),
              inp({type:"date",value:form.nextDate,onChange:ev=>setForm(p=>({...p,nextDate:ev.target.value})),style:is})
            ),
            d({style:{display:"flex",gap:8}},
              b({onClick:()=>setShowForm(false),style:{flex:1,padding:"10px 0",borderRadius:10,border:`1px solid ${t.border}40`,background:"transparent",color:t.muted,cursor:"pointer",fontWeight:700}},"Cancel"),
              b({onClick:addRec,style:{flex:2,padding:"10px 0",borderRadius:10,border:"none",background:`linear-gradient(135deg,${t.h1},${t.h2})`,color:"#fff",cursor:"pointer",fontWeight:700,fontSize:14}},"Add")
            )
          )
        : b({onClick:()=>setShowForm(true),style:{marginTop:14,width:"100%",padding:"10px 0",borderRadius:10,border:`1.5px dashed ${t.border}55`,background:"transparent",color:t.accent,cursor:"pointer",fontWeight:700,fontSize:13}},"+ Add Recurring Transaction")
    )
  );
}

// ─── MONTHLY REPORT ───────────────────────────────────────────────────────────
function MonthlyReport({st,t}){
  const months=useMemo(()=>{
    const map={};
    st.ledger.forEach(tx=>{
      const key=new Date(tx.when).toISOString().slice(0,7);
      if(!map[key])map[key]={key,txs:[],in:0,out:0,count:0};
      map[key].txs.push(tx);map[key].count++;
      if(tx.type==="DEPOSIT"||tx.type==="XFER-IN")map[key].in+=tx.amount;
      else map[key].out+=tx.amount;
    });
    return Object.values(map).sort((a,b)=>b.key.localeCompare(a.key));
  },[st.ledger]);
  const [sel,setSel]=useState(months[0]?.key||"");
  const month=months.find(m=>m.key===sel);
  const catBreak=useMemo(()=>{
    if(!month)return [];
    const map={};
    month.txs.filter(tx=>tx.type==="WITHDRAWAL"||tx.type==="XFER-OUT").forEach(tx=>{map[tx.category]=(map[tx.category]||0)+tx.amount;});
    return Object.entries(map).sort((a,b)=>b[1]-a[1]);
  },[month]);
  if(months.length===0)return d({style:{textAlign:"center",color:t.muted,padding:40,fontSize:13}},"No transactions yet.");
  return e(Fragment,null,
    d({style:{display:"flex",gap:8,overflowX:"auto",paddingBottom:6,marginBottom:14}},
      months.map(m=>b({key:m.key,onClick:()=>setSel(m.key),style:{padding:"6px 14px",borderRadius:20,fontWeight:700,fontSize:11,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,background:sel===m.key?`linear-gradient(135deg,${t.h1},${t.h2})`:t.panel,color:sel===m.key?"#fff":t.muted,border:sel===m.key?`1.5px solid ${t.accent}`:`1px solid ${t.border}35`}},
        new Date(m.key+"-15").toLocaleDateString("en-US",{month:"short",year:"numeric"})
      ))
    ),
    month&&e(Fragment,null,
      d({style:{display:"flex",gap:8,marginBottom:14}},
        e(StatPill,{label:"Income",value:"⬆ "+f$(month.in),color:t.good,t}),
        e(StatPill,{label:"Expenses",value:"⬇ "+f$(month.out),color:t.bad,t}),
        e(StatPill,{label:"Net",value:(month.in>=month.out?"▲ ":"▼ ")+f$(month.in-month.out),color:month.in>=month.out?t.good:t.bad,t})
      ),
      e(GBox,{title:"Spending Breakdown",right:month.count+" transactions",t},
        d({style:{padding:"14px 16px"}},
          catBreak.length===0&&d({style:{color:t.muted,fontSize:13,textAlign:"center",padding:12}},"No spending this month."),
          ...catBreak.map(([cat,amt])=>{
            const pct=month.out>0?(amt/month.out)*100:0,col=cc(cat);
            return d({key:cat,style:{marginBottom:11}},
              d({style:{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}},
                d({style:{display:"flex",alignItems:"center",gap:5}},s({style:{width:9,height:9,borderRadius:99,background:col,display:"inline-block"}}),s({style:{color:col,fontWeight:700}},cat)),
                s({style:{color:t.bad,fontWeight:700}},f$(amt)+" ",s({style:{color:t.muted,fontWeight:400}},`(${pct.toFixed(0)}%)`))
              ),
              d({style:{borderRadius:99,height:7,background:t.panel2,overflow:"hidden"}},d({style:{height:"100%",width:pct+"%",borderRadius:99,background:`linear-gradient(90deg,${col},${col}65)`,transition:"width .4s ease"}}))
            );
          })
        )
      ),
      e(GBox,{title:"All Transactions",t},
        ...[...month.txs].reverse().map((tx,i)=>e(TxRow,{key:tx.id,tx,i,t}))
      )
    )
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App(){
  const vw=useWindowWidth();
  const isDesktop=vw>=900&&!('ontouchstart' in window)&&navigator.maxTouchPoints===0;
  const [user,setUser]=useState(undefined);
  const [st,setSt]=useState(null);
  const [screen,setScreen]=useState("dashboard");
  const [tid,setTid]=useState(ldTid);
  
  const [undos,setUndos]=useState([]);
  const [redos,setRedos]=useState([]);
  const [search,setSearch]=useState("");
  const [showTheme,setShowTheme]=useState(false);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState({type:"WITHDRAWAL",amount:"",category:"UNCAT",note:""});
  const [formErr,setFormErr]=useState("");
  const [editOwner,setEditOwner]=useState(false);
  const [ownerDraft,setOwnerDraft]=useState("");
  const [editTx,setEditTx]=useState(null);
  const [showQuick,setShowQuick]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [fbReady,setFbReady]=useState(!!window._fbReady);
  const saveTimer=useRef(null);
  const listenUnsub=useRef(null);
  const T=THEMES[tid];

  
  useEffect(()=>{if(fbReady)return;const h=()=>setFbReady(true);window.addEventListener("fbready",h);return()=>window.removeEventListener("fbready",h);},[fbReady]);

  useEffect(()=>{
    if(!fbReady||!window._fbOnAuth)return;
    return window._fbOnAuth(async u=>{
      if(u){
        setUser(u);setSyncing(true);
        const remote=await window._fbLoad(u.uid);
        if(remote){setSt(remote);svSt(remote);}
        else{const local=ldSt();if(local){setSt(local);await window._fbSave(u.uid,local);}}
        setSyncing(false);
        if(listenUnsub.current)listenUnsub.current();
        listenUnsub.current=window._fbListen(u.uid,data=>{setSt(data);svSt(data);});
      }else{setUser(null);setSt(null);if(listenUnsub.current){listenUnsub.current();listenUnsub.current=null;}}
    });
  },[fbReady]);
  useEffect(()=>()=>{if(listenUnsub.current)listenUnsub.current();},[]);
  useEffect(()=>{svTid(tid);},[tid]);

  const userRef=useRef(user);
  useEffect(()=>{userRef.current=user;},[user]);

  const saveToCloud=useCallback(data=>{
    const uid=userRef.current?.uid;
    if(!uid||!data?.owner)return;
    svSt(data);clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>window._fbSave(uid,data),500);
  },[]);

  const setStAndSave=useCallback(upd=>{
    setSt(prev=>{const next=typeof upd==="function"?upd(prev):upd;if(next)saveToCloud(next);return next;});
  },[saveToCloud]);

          b({key:lb,onClick:fn,disabled:dis,style:{flex:1,background:"rgba(0,0,0,0.28)",border:`1px solid rgba(255,255,255,${dis?.07:.22})`,color:dis?"rgba(255,255,255,0.18)":"#fff",borderRadius:8,padding:"5px 2px",fontWeight:700,fontSize:10,cursor:dis?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:2}},s({style:{fontSize:12}},ic),lb)
        )
      )
    ),

    // SIDE NAV
    d({id:"sidenav",style:{background:T.panel}},
      d({style:{color:T.accent,fontWeight:900,fontSize:9,letterSpacing:"0.16em",padding:"4px 12px 8px",textTransform:"uppercase"}},"Navigation"),
      e(SideBtn,{id:"dashboard",icon:"🏠",label:"Home"}),
      e(SideBtn,{id:"ledger",icon:"📋",label:"Ledger"}),
      e(SideBtn,{id:"new-tx",icon:"➕",label:"New Transaction"}),
      e(SideBtn,{id:"analytics",icon:"📊",label:"Analytics"}),
      e(SideBtn,{id:"monthly",icon:"📅",label:"Monthly Reports"}),
      e(SideBtn,{id:"recurring",icon:"🔁",label:"Recurring"}),
      e(SideBtn,{id:"search",icon:"🔍",label:"Search"}),
      d({style:{flex:1}}),
      b({onClick:()=>setShowQuick(true),style:{display:"flex",alignItems:"center",gap:8,padding:"9px 12px",borderRadius:11,border:`1.5px solid ${T.accent}45`,cursor:"pointer",width:"100%",background:T.accent+"12",color:T.accent,fontWeight:700,fontSize:13,marginBottom:10}},"⚡ Quick Add"),
      d({style:{borderTop:`1px solid ${T.border}28`,paddingTop:10}},
        d({style:{color:T.muted,fontSize:9,padding:"0 12px 3px",textTransform:"uppercase",letterSpacing:"0.1em"}},"Signed in as"),
        d({style:{color:T.text,fontSize:11,fontWeight:700,padding:"0 12px 10px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(user&&user.email)||"")
      )
    ),

    // MAIN
    d({id:"main"},
      showTheme&&d({style:{margin:"10px 14px 0",background:T.panel,borderRadius:16,padding:14,border:`1px solid ${T.border}50`,className:"no-print"}},
        d({style:{color:T.accent,fontWeight:900,fontSize:10,letterSpacing:"0.14em",marginBottom:10}},"SELECT THEME"),
        d({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
          THEMES.map((th,i)=>b({key:i,onClick:()=>{setTid(i);setShowTheme(false);},style:{background:`linear-gradient(135deg,${th.h1},${th.h2})`,border:i===tid?"2.5px solid #fff":"1.5px solid transparent",borderRadius:9,padding:"7px 10px",color:"#fff",fontWeight:700,fontSize:11,cursor:"pointer",textAlign:"left"}},th.name))
        )
      ),
      d({id:"balcards",style:{display:"flex",gap:10,padding:"14px 14px 4px",flexWrap:"wrap"}},
        e(BalCard,{label:"Checking",value:st.checking,icon:"💳",color:T.good,t:T,spark:st.balanceHistory,sub:`This month: -${f$(monthOut)}`}),
        e(BalCard,{label:"Savings",value:st.savings,icon:"🏦",color:T.accent,t:T})
      ),
      d({id:"content",key:screen,className:"screen-fade"},SCREENS[screen]||SCREENS.dashboard)
    ),

    // BOTTOM NAV
    d({id:"bottomnav",style:{background:T.panel,borderTop:`2px solid ${T.border}38`,boxShadow:"0 -4px 20px #00000080",paddingBottom:"env(safe-area-inset-bottom,0px)"}},
      e(NavBtn,{id:"dashboard",icon:"🏠",label:"Home"}),
      e(NavBtn,{id:"ledger",icon:"📋",label:"Ledger"}),
      e(NavBtn,{id:"monthly",icon:"📅",label:"Monthly"}),
      e(NavBtn,{id:"recurring",icon:"🔁",label:"Recurring"}),
      e(NavBtn,{id:"analytics",icon:"📊",label:"Analytics"})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
})();
</script>
<script>
if("serviceWorker" in navigator){navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});}
</script>
<script>
(function(){
  function applyLayout(){
    const vw=window.innerWidth,app=document.getElementById('app'),hdr=document.getElementById('header');
    if(!app)return;
    if(vw>=900){
      const sw=Math.round(Math.min(260,Math.max(180,vw*.17)));
      const cp=Math.round(Math.min(60,Math.max(20,(vw-sw)*.03)));
      const hw=hdr?hdr.getBoundingClientRect().height:110;
      const r=document.documentElement;
      r.style.setProperty('--sw',sw+'px');r.style.setProperty('--cp',cp+'px');r.style.setProperty('--hw',hw+'px');
      app.setAttribute('data-layout','desktop');
    }else{app.setAttribute('data-layout','mobile');}
  }
  applyLayout();window.addEventListener('resize',applyLayout);window.addEventListener('load',applyLayout);
  [50,200,500,1000].forEach(t=>setTimeout(applyLayout,t));
})();
</script>
