<div id="app"></div>
<script>

// ─── STORAGE ────────────────────────────────────────────────
const SAVE_KEY = "chk_app_v1";
function saveState() {
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch(e){}
}
function loadState() {
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return null;
}

  {name:"Twilight Indigo",h1:"#30006f",h2:"#6030af",accent:"#9f70ff",panel:"#100820",panel2:"#0b0518",good:"#87df87",warn:"#ffdf5f",bad:"#ff5f87",text:"#e0d0ff",muted:"#705090",border:"#6030af"},
  {name:"Monochrome",     h1:"#404040",h2:"#707070",accent:"#c0c0c0",panel:"#1a1a1a",panel2:"#101010",good:"#d0d0d0",warn:"#a0a0a0",bad:"#606060",text:"#e8e8e8",muted:"#606060",border:"#707070"}

const CAT_COLORS={INCOME:"#00ff87",GROCERIES:"#ffd700",UTILITIES:"#ff8700",DINING:"#ff6eb4",HOUSING:"#87afff",TRANSFER:"#00d7ff",BILLS:"#ff875f",SAVINGS:"#87d75f",ENTERTAINMENT:"#bf87ff",GAS:"#ffbf00",HEALTH:"#ff87af",UNCAT:"#808080"};
const CATEGORIES=["INCOME","GROCERIES","UTILITIES","DINING","HOUSING","BILLS","TRANSFER","SAVINGS","ENTERTAINMENT","GAS","HEALTH","UNCAT"];
const catColor=c=>CAT_COLORS[(c||"").toUpperCase()]||"#a0a0a0";
const fmtMoney=v=>{const n=v<0,a=Math.abs(v);return(n?"-$":"$")+a.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",");};
const fmtDate=ts=>{const d=new Date(ts);return d.toLocaleDateString("en-US",{month:"short",day:"2-digit",year:"numeric"})+" "+d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});};
const fmtShort=ts=>new Date(ts).toLocaleDateString("en-US",{month:"short",day:"2-digit"});
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ─── DEFAULT STATE ───────────────────────────────────────────
function defaultState() {
  const n=Date.now();
  return {
    owner:"Alex Morgan", accountNum:"****4821",
    checking:3428.56, savings:1250.00, nextId:8, themeIdx:0,
    ledger:[
      {id:1,when:n-86400000*7,type:"DEPOSIT",   amount:2800.00,category:"INCOME",   note:"Direct deposit payroll",  postBalance:2800.00},
      {id:2,when:n-86400000*6,type:"WITHDRAWAL",amount:145.32, category:"GROCERIES",note:"Whole Foods Market",       postBalance:2654.68},
      {id:3,when:n-86400000*5,type:"WITHDRAWAL",amount:89.99,  category:"UTILITIES",note:"Electric bill",            postBalance:2564.69},
      {id:4,when:n-86400000*4,type:"WITHDRAWAL",amount:55.00,  category:"DINING",   note:"The Capital Grille",       postBalance:2509.69},
      {id:5,when:n-86400000*3,type:"XFER-OUT",  amount:250.00, category:"TRANSFER", note:"Move to savings",          postBalance:2259.69},
      {id:6,when:n-86400000*2,type:"WITHDRAWAL",amount:1200.00,category:"HOUSING",  note:"Monthly rent payment",     postBalance:1059.69},
      {id:7,when:n-86400000*1,type:"DEPOSIT",   amount:2368.87,category:"INCOME",   note:"Freelance invoice #4122",  postBalance:3428.56}
    ],
    balanceHistory:[2800,2654,2564,2509,2259,1059,3428]
  };
}

// ─── INIT STATE ──────────────────────────────────────────────
let state = loadState() || defaultState();
let undos=[],redos=[],screen="dashboard";
let themeIdx = state.themeIdx || 0;
let showTheme=false,toast=null,toastTimer=null;
let form={type:"DEPOSIT",amount:"",category:"INCOME",note:""};
let formErr="",searchQ="",editOwner=false,ownerDraft="";

function T(){return THEMES[themeIdx];}

function save(){
  state.themeIdx = themeIdx;
  saveState();
}

function notify(msg,ok=true){
  toast={msg,ok};
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{toast=null;render();},2500);
  render();
}

function pushUndo(){undos=[...undos.slice(-49),JSON.parse(JSON.stringify(state))];redos=[];}
function undo(){if(!undos.length)return;redos=[...redos,JSON.parse(JSON.stringify(state))];state=undos.pop();save();notify("Undo applied",false);}
function redo(){if(!redos.length)return;undos=[...undos,JSON.parse(JSON.stringify(state))];state=redos.pop();save();notify("Redo applied",false);}
function setTxType(v){form.type=v;formErr="";render();}
function setTxCat(v){form.category=v;render();}
function setScreen(s){screen=s;render();}
function setTheme(i){themeIdx=i;showTheme=false;save();render();}
function toggleTheme(){showTheme=!showTheme;render();}
function startEditOwner(){ownerDraft=state.owner;editOwner=true;render();}
function saveOwner(){const el=document.getElementById("ownerInp");if(el&&el.value.trim())state.owner=el.value.trim();editOwner=false;save();render();}
function syncForm(){const a=document.getElementById("txAmt"),n=document.getElementById("txNote");if(a)form.amount=a.value;if(n)form.note=n.value;}

function submitTx(){
  syncForm();
  const amt=parseFloat(form.amount);
  if(!amt||amt<=0){formErr="Enter a valid positive amount.";render();return;}
  if((form.type==="WITHDRAWAL"||form.type==="XFER-OUT")&&amt>state.checking+1e-9){formErr="Insufficient checking funds.";render();return;}
  if(form.type==="XFER-IN"&&amt>state.savings+1e-9){formErr="Insufficient savings funds.";render();return;}
  pushUndo();
  let chk=state.checking,sav=state.savings;
  if(form.type==="DEPOSIT")   chk+=amt;
  if(form.type==="WITHDRAWAL")chk-=amt;
  if(form.type==="XFER-OUT") {chk-=amt;sav+=amt;}
  if(form.type==="XFER-IN")  {chk+=amt;sav-=amt;}
  state.ledger.push({id:state.nextId,when:Date.now(),type:form.type,amount:amt,
    category:form.category||"UNCAT",note:form.note,postBalance:chk});
  state.checking=chk;state.savings=sav;state.nextId++;
  state.balanceHistory=[...state.balanceHistory,chk].slice(-30);
  form={type:"DEPOSIT",amount:"",category:"INCOME",note:""};
  formErr="";screen="dashboard";
  save();notify("Transaction saved! ✓");
}

function exportCSV(){
  const rows=["id,date,type,amount,balance,category,note",
    ...state.ledger.map(t=>`${t.id},"${fmtDate(t.when)}",${t.type},${t.amount.toFixed(2)},${t.postBalance.toFixed(2)},"${t.category}","${(t.note||"").replace(/"/g,'\\"')}"`)];
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([rows.join("\n")],{type:"text/csv"}));
  a.download="ledger.csv";a.click();
  notify("CSV exported!");
}

function clearAllData(){
  if(!confirm("Clear ALL data and reset to defaults?"))return;
  localStorage.removeItem(SAVE_KEY);
  state=defaultState();undos=[];redos=[];themeIdx=0;
  screen="dashboard";notify("Data cleared.");
}

// ─── SPARKLINE ───────────────────────────────────────────────
function spark(data,color,w,h){
  if(!data||data.length<2)return"";
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>((i/(data.length-1))*w).toFixed(1)+","+(h-4-((v-mn)/rng)*(h-8)).toFixed(1)).join(" ");
  const fill=`0,${h} ${pts} ${w},${h}`;
  const id="sg"+w+h+color.slice(1);
  const ly=(h-4-((data[data.length-1]-mn)/rng)*(h-8)).toFixed(1);
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="display:block">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.03"/>
    </linearGradient></defs>
    <polygon points="${fill}" fill="url(#${id})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
    <circle cx="${w}" cy="${ly}" r="3" fill="${color}"/>
  </svg>`;
}

// ─── UI HELPERS ──────────────────────────────────────────────
function gbox(title,right,body){
  const t=T();
  return `<div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 24px #00000060;border:1px solid ${t.border}60;margin-bottom:14px">
    <div style="background:linear-gradient(135deg,${t.h1},${t.h2});padding:10px 16px;display:flex;justify-content:space-between;align-items:center">
      <span style="color:#fff;font-weight:900;font-size:12px;letter-spacing:.14em;text-transform:uppercase">${title}</span>
      ${right?`<span style="color:rgba(255,255,255,.7);font-size:11px">${right}</span>`:""}
    </div>
    <div style="height:3px;background:linear-gradient(90deg,${t.accent},${t.h2}40)"></div>
    <div style="background:${t.panel}">${body}</div>
    <div style="height:2px;background:linear-gradient(90deg,${t.h2},${t.h1})"></div>
    <div style="height:5px;background:linear-gradient(135deg,${t.h2},${t.h1})"></div>
  </div>`;
}

function txRow(tx,i){
  const t=T(),isIn=tx.type==="DEPOSIT"||tx.type==="XFER-IN",cc=catColor(tx.category);
  return `<div style="display:flex;align-items:center;gap:10px;padding:11px 16px;background:${i%2===0?t.panel:t.panel2+"cc"};border-bottom:1px solid ${t.border}20">
    <div style="width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;background:${cc}22;border:1px solid ${cc}50">${isIn?"⬆":"⬇"}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:700;font-size:13px;color:${t.text};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(tx.note||tx.category)}</div>
      <div style="font-size:11px;color:${t.muted};margin-top:2px">${fmtShort(tx.when)} &middot; <span style="color:${cc}">${esc(tx.category)}</span></div>
    </div>
    <div style="text-align:right;flex-shrink:0">
      <div style="font-weight:900;font-size:14px;color:${isIn?t.good:t.bad}">${isIn?"+":"-"}${fmtMoney(tx.amount)}</div>
      <div style="font-size:10px;color:${t.muted}">Bal ${fmtMoney(tx.postBalance)}</div>
    </div>
  </div>`;
}

function balCard(label,value,icon,color,sparkData){
  const t=T();
  return `<div style="border-radius:16px;overflow:hidden;box-shadow:0 4px 24px #00000060;border:1px solid ${color}40;flex:1;min-width:0">
    <div style="background:linear-gradient(135deg,${t.h1},${t.h2});padding:8px 14px">
      <span style="color:rgba(255,255,255,.8);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase">${label}</span>
    </div>
    <div style="height:2px;background:linear-gradient(90deg,${color},transparent)"></div>
    <div style="background:${t.panel};padding:12px 14px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:${sparkData?8:0}px">
        <span style="font-size:22px">${icon}</span>
        <span style="color:${color};font-weight:900;font-size:20px">${fmtMoney(value)}</span>
      </div>
      ${sparkData?spark(sparkData,color,140,28):""}
    </div>
    <div style="height:2px;background:linear-gradient(90deg,${t.h2},${t.h1})"></div>
    <div style="height:4px;background:linear-gradient(135deg,${t.h2},${t.h1})"></div>
  </div>`;
}

// ─── SCREENS ─────────────────────────────────────────────────
function pgDashboard(){
  const t=T();
  const tIn=state.ledger.filter(x=>x.type==="DEPOSIT"||x.type==="XFER-IN").reduce((s,x)=>s+x.amount,0);
  const tOut=state.ledger.filter(x=>x.type==="WITHDRAWAL"||x.type==="XFER-OUT").reduce((s,x)=>s+x.amount,0);
  const net=tIn-tOut;
  const mini=[["In",tIn,t.good,"⬆"],["Out",tOut,t.bad,"⬇"],["Net",net,net>=0?t.good:t.bad,"≈"]].map(([l,v,c,ic])=>
    `<div style="flex:1;border-radius:14px;overflow:hidden;border:1px solid ${c}40;box-shadow:0 2px 12px #00000050">
      <div style="background:linear-gradient(135deg,${t.h1},${t.h2});padding:5px 10px"><span style="color:rgba(255,255,255,.75);font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase">${l}</span></div>
      <div style="height:2px;background:linear-gradient(90deg,${c},transparent)"></div>
      <div style="background:${t.panel};padding:8px 10px;text-align:center"><div style="font-size:14px;font-weight:900;color:${c}">${ic} ${fmtMoney(v)}</div></div>
      <div style="height:3px;background:linear-gradient(135deg,${t.h2},${t.h1})"></div>
    </div>`).join("");
  const rows=[...state.ledger].reverse().slice(0,10).map((tx,i)=>txRow(tx,i)).join("");
  const empty=!state.ledger.length?`<div style="padding:24px;text-align:center;color:${t.muted};font-size:13px">No transactions yet. Tap ➕ to add one.</div>`:"";
  return `<div style="display:flex;gap:10px;margin-bottom:14px">${mini}</div>${gbox("Recent Transactions",state.ledger.length+" total",rows+empty)}`;
}

function pgLedger(){
  const t=T();
  const fil=[...state.ledger].reverse().filter(x=>!searchQ||x.category.toLowerCase().includes(searchQ.toLowerCase())||(x.note||"").toLowerCase().includes(searchQ.toLowerCase()));
  return gbox("Full Transaction Ledger","Most recent first",
    fil.map((tx,i)=>txRow(tx,i)).join("")||`<div style="padding:24px;text-align:center;color:${t.muted};font-size:13px">No transactions found.</div>`);
}

function pgNewTx(){
  const t=T();
  const errH=formErr?`<div style="background:${t.bad}22;color:${t.bad};border:1px solid ${t.bad}60;border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;margin-bottom:16px">⚠ ${esc(formErr)}</div>`:"";
  const typeBtns=[
    {v:"DEPOSIT",   l:"Deposit",     i:"⬆",c:t.good},
    {v:"WITHDRAWAL",l:"Withdrawal",  i:"⬇",c:t.bad},
    {v:"XFER-OUT",  l:"To Savings",  i:"→",c:t.warn},
    {v:"XFER-IN",   l:"From Savings",i:"←",c:t.accent}
  ].map(({v,l,i,c})=>{
    const act=form.type===v;
    return `<button onclick="setTxType('${v}')" style="background:${act?`linear-gradient(135deg,${t.h1},${t.h2})`:t.panel2};color:${act?"#fff":c};border:${act?`2px solid ${t.accent}`:`1.5px solid ${c}50`};border-radius:13px;padding:13px 8px;font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center;gap:7px;box-shadow:${act?`0 0 16px ${t.accent}50`:"none"};width:100%"><span style="font-size:18px">${i}</span>${l}</button>`;
  }).join("");
  const catBtns=CATEGORIES.map(c=>{
    const act=form.category===c,cc=catColor(c);
    return `<button onclick="setTxCat('${c}')" style="padding:7px 13px;border-radius:20px;font-weight:700;font-size:11px;background:${act?cc+"30":t.panel2};color:${act?cc:t.muted};border:${act?`1.5px solid ${cc}`:`1px solid ${t.border}40`}">${c}</button>`;
  }).join("");
  return gbox("New Transaction","",`<div style="padding:20px 18px">
    ${errH}
    <div style="margin-bottom:18px">
      <div style="color:${t.accent};font-weight:800;font-size:11px;letter-spacing:.12em;margin-bottom:10px">TRANSACTION TYPE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">${typeBtns}</div>
    </div>
    <div style="margin-bottom:14px">
      <div style="color:${t.accent};font-weight:800;font-size:11px;letter-spacing:.12em;margin-bottom:8px">AMOUNT</div>
      <input id="txAmt" type="number" placeholder="0.00" value="${esc(form.amount)}" min="0" step="0.01"
        style="background:${t.panel2};color:${t.good};border:1px solid ${t.border}60;border-radius:12px;padding:11px 14px;font-size:20px;font-weight:900;outline:none;width:100%"/>
    </div>
    <div style="margin-bottom:14px">
      <div style="color:${t.accent};font-weight:800;font-size:11px;letter-spacing:.12em;margin-bottom:8px">CATEGORY</div>
      <div style="display:flex;flex-wrap:wrap;gap:7px">${catBtns}</div>
    </div>
    <div style="margin-bottom:22px">
      <div style="color:${t.accent};font-weight:800;font-size:11px;letter-spacing:.12em;margin-bottom:8px">NOTE (OPTIONAL)</div>
      <input id="txNote" type="text" placeholder="e.g. Grocery run, rent payment..." value="${esc(form.note)}"
        style="background:${t.panel2};color:${t.text};border:1px solid ${t.border}60;border-radius:12px;padding:11px 14px;font-size:14px;outline:none;width:100%"/>
    </div>
    <button onclick="syncForm();submitTx()" style="width:100%;padding:15px 0;border-radius:14px;font-weight:900;font-size:16px;color:#fff;border:none;background:linear-gradient(135deg,${t.h1},${t.h2});box-shadow:0 4px 20px ${t.accent}50">
      ✅ Record Transaction
    </button>
  </div>`);
}

function pgAnalytics(){
  const t=T();
  const tIn=state.ledger.filter(x=>x.type==="DEPOSIT"||x.type==="XFER-IN").reduce((s,x)=>s+x.amount,0);
  const tOut=state.ledger.filter(x=>x.type==="WITHDRAWAL"||x.type==="XFER-OUT").reduce((s,x)=>s+x.amount,0);
  const net=tIn-tOut;
  const sumCards=[["Inflow",tIn,t.good],["Outflow",tOut,t.bad],["Net",net,net>=0?t.good:t.bad]].map(([l,v,c])=>
    `<div style="text-align:center;padding:12px 8px;border-radius:12px;background:${t.panel2};border:1px solid ${c}30">
      <div style="color:${t.muted};font-size:10px;letter-spacing:.1em;margin-bottom:6px">${l}</div>
      <div style="color:${c};font-weight:900;font-size:15px">${fmtMoney(v)}</div>
    </div>`).join("");
  const spend={};
  state.ledger.filter(x=>x.type==="WITHDRAWAL").forEach(x=>{spend[x.category]=(spend[x.category]||0)+x.amount;});
  const top=Object.entries(spend).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const bars=top.map(([cat,amt])=>{
    const pct=tOut>0?(amt/tOut)*100:0,cc=catColor(cat);
    return `<div style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
        <span style="color:${cc};font-weight:700">${cat}</span>
        <span style="color:${t.bad};font-weight:700">${fmtMoney(amt)} <span style="color:${t.muted};font-weight:400">(${pct.toFixed(1)}%)</span></span>
      </div>
      <div style="border-radius:99px;height:9px;background:${t.panel2};overflow:hidden">
        <div style="height:100%;width:${pct}%;border-radius:99px;background:linear-gradient(90deg,${cc},${cc}70);box-shadow:0 0 8px ${cc}60"></div>
      </div>
    </div>`;
  }).join("");
  const sw=Math.max(200,(document.getElementById("app").offsetWidth||360)-60);
  return gbox("Financial Summary","",`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:16px">${sumCards}</div>`)+
    gbox("Balance History","",`<div style="padding:14px 18px">${spark(state.balanceHistory,t.good,sw,70)}<div style="display:flex;justify-content:space-between;font-size:10px;color:${t.muted};margin-top:4px"><span>Oldest</span><span>Latest: ${fmtMoney(state.checking)}</span></div></div>`)+
    gbox("Spending by Category","",`<div style="padding:14px 18px">${bars||`<div style="text-align:center;color:${t.muted};font-size:13px;padding:16px">No spending data yet.</div>`}</div>`);
}

function pgSearch(){
  const t=T();
  const fil=[...state.ledger].reverse().filter(x=>!searchQ||x.category.toLowerCase().includes(searchQ.toLowerCase())||(x.note||"").toLowerCase().includes(searchQ.toLowerCase()));
  return gbox("Search Transactions","",`<div style="padding:14px 16px">
    <input id="srchInp" type="text" placeholder="Search category or note..." value="${esc(searchQ)}"
      oninput="searchQ=this.value;render()"
      style="background:${t.panel2};color:${t.text};border:1px solid ${t.border}60;border-radius:12px;padding:11px 14px;font-size:14px;outline:none;width:100%;margin-bottom:10px"/>
    <div style="font-size:11px;color:${t.muted};margin-bottom:8px">${fil.length} result(s)</div>
    ${fil.map((tx,i)=>txRow(tx,i)).join("")||`<div style="padding:20px;text-align:center;color:${t.muted};font-size:13px">No results found.</div>`}
  </div>`);
}

// ─── MAIN RENDER ─────────────────────────────────────────────
function render(){
  const t=T();
  document.body.style.background=t.panel2;
  document.body.style.color=t.text;

  const uDis=!undos.length,rDis=!redos.length;
  const ownerEl=editOwner
    ?`<span style="display:flex;gap:6px;align-items:center">
        <input id="ownerInp" value="${esc(ownerDraft)}" onkeydown="if(event.key==='Enter')saveOwner()"
          style="background:rgba(0,0,0,.3);border:1px solid ${t.accent};border-radius:6px;color:#fff;padding:3px 8px;font-size:11px;outline:none;width:120px"/>
        <button onclick="saveOwner()" style="background:${t.good};border:none;border-radius:5px;padding:3px 10px;font-weight:700;font-size:11px;color:#000">✓</button>
      </span>`
    :`<span onclick="startEditOwner()" style="cursor:pointer">${esc(state.owner)} &middot; ${state.accountNum} ✏️</span>`;

  const header=`<div style="background:linear-gradient(135deg,${t.h1} 0%,${t.h2} 60%,${t.h1} 100%);padding:16px 18px 14px;box-shadow:0 4px 24px #00000060;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="width:44px;height:44px;border-radius:12px;background:rgba(0,0,0,.3);border:2px solid ${t.accent}60;display:flex;align-items:center;justify-content:center;font-size:22px">🏦</div>
        <div>
          <div style="color:#fff;font-weight:900;font-size:17px;letter-spacing:.03em">CHECKING ACCOUNT</div>
          <div style="color:rgba(255,255,255,.65);font-size:11px">${ownerEl}</div>
        </div>
      </div>
      <button onclick="toggleTheme()" style="background:rgba(0,0,0,.3);border:1px solid ${t.accent}60;color:#fff;border-radius:10px;padding:8px 14px;font-weight:700;font-size:13px">🎨</button>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="undo()" ${uDis?"disabled":""} style="flex:1;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,${uDis?.1:.3});color:${uDis?"rgba(255,255,255,.25)":"#fff"};border-radius:9px;padding:8px 4px;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px"><span style="font-size:15px">↩</span>Undo</button>
      <button onclick="redo()" ${rDis?"disabled":""} style="flex:1;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,${rDis?.1:.3});color:${rDis?"rgba(255,255,255,.25)":"#fff"};border-radius:9px;padding:8px 4px;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px"><span style="font-size:15px">↪</span>Redo</button>
      <button onclick="exportCSV()" style="flex:1;background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:9px;padding:8px 4px;font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px"><span style="font-size:15px">📥</span>Export</button>
    </div>
  </div>`;

  const picker=showTheme?`<div style="margin:10px 14px;background:${t.panel};border-radius:16px;padding:16px;border:1px solid ${t.border}60;box-shadow:0 8px 32px #00000060">
    <div style="color:${t.accent};font-weight:900;font-size:11px;letter-spacing:.14em;margin-bottom:10px">SELECT THEME</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:7px">
      ${THEMES.map((th,i)=>`<button onclick="setTheme(${i})" style="background:linear-gradient(135deg,${th.h1},${th.h2});border:${i===themeIdx?"2.5px solid #fff":"1.5px solid transparent"};border-radius:10px;padding:9px 10px;color:#fff;font-weight:700;font-size:12px;text-align:left;box-shadow:${i===themeIdx?`0 0 14px ${th.accent}`:"none"}">${th.name}</button>`).join("")}
    </div>
    <button onclick="clearAllData()" style="margin-top:12px;width:100%;padding:8px;border-radius:10px;background:${t.bad}22;color:${t.bad};border:1px solid ${t.bad}50;font-weight:700;font-size:12px">🗑 Clear All Data</button>
  </div>`:"";

  const cards=`<div style="display:flex;gap:10px;padding:14px 14px 4px">
    ${balCard("Checking",state.checking,"💳",t.good,state.balanceHistory)}
    ${balCard("Savings",state.savings,"🏦",t.accent,null)}
  </div>`;

  let body="";
  if(screen==="dashboard")body=pgDashboard();
  else if(screen==="ledger")body=pgLedger();
  else if(screen==="new-tx")body=pgNewTx();
  else if(screen==="analytics")body=pgAnalytics();
  else if(screen==="search")body=pgSearch();

  const tabs=[["dashboard","🏠","Home"],["ledger","📋","Ledger"],["new-tx","➕","New"],["analytics","📊","Analytics"],["search","🔍","Search"]];
  const nav=`<div style="position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:600px;background:${t.panel};border-top:2px solid ${t.border}40;display:flex;box-shadow:0 -4px 20px #00000080;z-index:200">
    ${tabs.map(([id,ic,lb])=>{const act=screen===id;return `<button onclick="setScreen('${id}')" style="flex:1;padding:9px 4px;border:none;background:${act?`linear-gradient(135deg,${t.h1},${t.h2})`:t.panel};color:${act?"#fff":t.muted};font-weight:700;font-size:11px;border-top:${act?`2px solid ${t.accent}`:"2px solid transparent"};display:flex;flex-direction:column;align-items:center;gap:3px;box-shadow:${act?`inset 0 -2px 8px ${t.accent}30`:"none"}"><span style="font-size:18px">${ic}</span>${lb}</button>`;}).join("")}
  </div>`;

  const toastH=toast?`<div style="position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:9999;background:linear-gradient(135deg,${t.h1},${t.h2});border:1.5px solid ${toast.ok?t.good:t.warn};border-radius:12px;padding:10px 22px;color:#fff;font-weight:700;font-size:13px;box-shadow:0 8px 32px #00000080;white-space:nowrap">${toast.ok?"✅":"↩"} ${esc(toast.msg)}</div>`:"";

  document.getElementById("app").innerHTML=toastH+header+picker+cards+`<div style="padding:10px 14px 90px">${body}</div>`+nav;

  if(screen==="search"){const el=document.getElementById("srchInp");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}
  if(editOwner){const el=document.getElementById("ownerInp");if(el){el.focus();el.setSelectionRange(el.value.length,el.value.length);}}
}

render();
</script>
</body>
</html>
