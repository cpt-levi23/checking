const firebaseConfig={apiKey:"AIzaSyCf8YVpGcKsv5jVS_Sil-huIALbGPbuP7c",authDomain:"checkingapp-9f160.firebaseapp.com",projectId:"checkingapp-9f160",storageBucket:"checkingapp-9f160.firebasestorage.app",messagingSenderId:"960468279049",appId:"1:960468279049:web:05ec7ab471e2d1805fbdd8"};
const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();
window._fbSignIn=()=>signInWithPopup(auth,provider).catch(()=>signInWithRedirect(auth,provider));
window._fbSignOut=()=>signOut(auth);
window._fbOnAuth=cb=>onAuthStateChanged(auth,cb);
window._fbSave=async(uid,data)=>{
  if(!data||!uid||!data.owner)return;
  const ts=Date.now();
  const withTs={...data,updatedAt:ts};
  try{
    await setDoc(doc(db,"users",uid),{state:JSON.stringify(withTs),updatedAt:ts});
    console.log("☁ saved to Firebase",new Date().toLocaleTimeString());
  }catch(e){console.error("Firebase save error:",e.code,e.message);}
};
window._fbLoad=async uid=>{
  try{
    const s=await getDoc(doc(db,"users",uid));
    if(s.exists()&&s.data().state){
      const p=JSON.parse(s.data().state);
      if(p&&p.owner)return p;
    }
  }catch(e){console.error("Firebase load error:",e);}
  return null;
};
window._fbListen=(uid,cb)=>onSnapshot(doc(db,"users",uid),s=>{
  if(s.exists()&&s.data().state){
    try{const p=JSON.parse(s.data().state);if(p&&p.owner)cb(p);}
    catch(e){}
  }
});
getRedirectResult(auth).catch(()=>{});
window._fbReady=true;window.dispatchEvent(new Event("fbready"));
</script>

function Spark({data,color,ht=40}){
  if(!data||data.length<2)return null;
  const W=300,mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>((i/(data.length-1))*W).toFixed(1)+","+(ht-4-((v-mn)/rng)*(ht-8)).toFixed(1)).join(" ");
  const uid="sp"+color.replace("#","");
  const last=data[data.length-1],ly=ht-4-((last-mn)/rng)*(ht-8);
  return e("svg",{viewBox:`0 0 ${W} ${ht}`,style:{display:"block",width:"100%",height:ht}},
    e("defs",null,e("linearGradient",{id:uid,x1:"0",y1:"0",x2:"0",y2:"1"},
      e("stop",{offset:"0%",stopColor:color,stopOpacity:0.4}),
      e("stop",{offset:"100%",stopColor:color,stopOpacity:0.03})
    )),
    e("polygon",{points:`0,${ht} ${pts} ${W},${ht}`,fill:`url(#${uid})`}),
    e("polyline",{points:pts,fill:"none",stroke:color,strokeWidth:"2",strokeLinejoin:"round",strokeLinecap:"round"}),
    e("circle",{cx:W,cy:ly,r:"3",fill:color})
  );
}

function Setup({onDone,t}){

      d({style:{background:t.panel,borderRadius:18,padding:24,border:`1px solid ${t.border}40`,boxShadow:"0 8px 40px #00000080",display:"flex",flexDirection:"column",gap:16}},

        fld("ACCOUNT LAST 4 (optional)",inp({placeholder:"e.g. 4821",maxLength:4,value:digits,onChange:ev=>setDigits(ev.target.value.replace(/\D/g,"")),style:is})),
        fld("CURRENT CHECKING BALANCE",inp({type:"number",placeholder:"0.00",min:"0",step:"0.01",value:chk,onChange:ev=>setChk(ev.target.value),style:is})),
        fld("SAVINGS BALANCE (optional)",inp({type:"number",placeholder:"0.00",min:"0",step:"0.01",value:sav,onChange:ev=>setSav(ev.target.value),style:is})),

function App(){
  const [user,setUser]=useState(undefined);
  const [st,setSt]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [screen,setScreen]=useState("dashboard");
  const [tid,setTid]=useState(ldTid);
  const [undos,setUndos]=useState([]);
  const [redos,setRedos]=useState([]);
  const [search,setSearch]=useState("");
  const [showTheme,setShowTheme]=useState(false);
  const [toast,setToast]=useState(null);
  const [form,setForm]=useState({type:"DEPOSIT",amount:"",category:"INCOME",note:""});
  const [formErr,setFormErr]=useState("");
  const [editOwner,setEditOwner]=useState(false);
  const [ownerDraft,setOwnerDraft]=useState("");
  const [editTx,setEditTx]=useState(null);
  const [fbReady,setFbReady]=useState(!!window._fbReady);
  const saveTimer=useRef(null);
  const listenUnsub=useRef(null);
  const T=THEMES[tid];

  useEffect(()=>{if(fbReady)return;const h=()=>setFbReady(true);window.addEventListener("fbready",h);return()=>window.removeEventListener("fbready",h);},[fbReady]);

  // Single auth+sync effect — Firebase is the ONLY source of truth
  useEffect(()=>{
    if(!fbReady||!window._fbOnAuth)return;
    return window._fbOnAuth(async u=>{
      if(u){
        setUser(u);
        setSyncing(true);
        // Always load fresh from Firebase first
        const remote=await window._fbLoad(u.uid);
        if(remote){
          setSt(remote);
          svSt(remote); // update local cache
        } else {
          // First time — migrate from localStorage if exists
          const local=ldSt();
          if(local){setSt(local);await window._fbSave(u.uid,local);}
        }
        setSyncing(false);
        // Real-time listener: always accept what Firebase says
        if(listenUnsub.current)listenUnsub.current();
        listenUnsub.current=window._fbListen(u.uid,remote=>{
          setSt(remote);
          svSt(remote); // keep local cache fresh
        });
      } else {
        setUser(null);
        setSt(null);
        if(listenUnsub.current){listenUnsub.current();listenUnsub.current=null;}
      }
    });
  },[fbReady]);

  useEffect(()=>()=>{if(listenUnsub.current)listenUnsub.current();},[]);
  useEffect(()=>{svTid(tid);},[tid]);

  const userRef=useRef(user);
  useEffect(()=>{userRef.current=user;},[user]);

  // Save: write to Firebase immediately, no debounce race
  const saveToCloud=useCallback((data)=>{
    const uid=userRef.current&&userRef.current.uid;
    if(!uid||!data||!data.owner)return;
    clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      window._fbSave(uid,data);
    },500);
  },[]);

  const setStAndSave=useCallback(updater=>{
    setSt(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(next)saveToCloud(next);
      return next;
    });
  },[saveToCloud]);

  const notify=useCallback((msg,ok=true)=>{setToast({msg,ok});setTimeout(()=>setToast(null),2500);},[]);
  const pushUndo=useCallback(x=>{setUndos(p=>[...p.slice(-49),x]);setRedos([]);},[]);
  const undo=()=>{if(!undos.length)return;setRedos(r=>[...r,st]);setStAndSave(undos[undos.length-1]);setUndos(u=>u.slice(0,-1));notify("Undo applied",false);};
  const redo=()=>{if(!redos.length)return;setUndos(u=>[...u,st]);setStAndSave(redos[redos.length-1]);setRedos(r=>r.slice(0,-1));notify("Redo applied",false);};

  if(user===undefined||!fbReady)return d({style:{minHeight:"100vh",background:"#0f0f23",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}},d({style:{fontSize:48}},"🏦"),d({style:{color:"#00d7ff",fontWeight:700,fontSize:14}},"Loading..."));
  if(!user)return e(SignInScreen,{t:T});
  if(!st)return e(Setup,{t:T,onDone:x=>setStAndSave(x)});

  const recalc=ledger=>{let chk=0,sv=st.savings;return ledger.map(tx=>{if(tx.type==="DEPOSIT")chk+=tx.amount;if(tx.type==="WITHDRAWAL")chk-=tx.amount;if(tx.type==="XFER-OUT"){chk-=tx.amount;sv+=tx.amount;}if(tx.type==="XFER-IN"){chk+=tx.amount;sv-=tx.amount;}return{...tx,postBalance:chk};});};

  const saveTx=updated=>{pushUndo(st);setStAndSave(prev=>{const idx=prev.ledger.findIndex(t=>t.id===updated.id);if(idx<0)return prev;const nl=[...prev.ledger];nl[idx]=updated;const rc=recalc(nl);return{...prev,checking:rc.length?rc[rc.length-1].postBalance:prev.checking,ledger:rc,balanceHistory:rc.map(t=>t.postBalance).slice(-60)};});setEditTx(null);notify("Transaction updated!");};
  const deleteTx=id=>{pushUndo(st);setStAndSave(prev=>{const nl=prev.ledger.filter(t=>t.id!==id);const rc=recalc(nl);return{...prev,checking:rc.length?rc[rc.length-1].postBalance:0,ledger:rc,balanceHistory:rc.map(t=>t.postBalance).slice(-60)};});setEditTx(null);notify("Transaction deleted!");};

  const submitTx=()=>{
    const amt=parseFloat(form.amount);
    if(!amt||amt<=0){setFormErr("Enter a valid positive amount.");return;}
    if((form.type==="WITHDRAWAL"||form.type==="XFER-OUT")&&amt>st.checking+1e-9){setFormErr("Insufficient funds.");return;}
    if(form.type==="XFER-IN"&&amt>st.savings+1e-9){setFormErr("Insufficient savings.");return;}
    pushUndo(st);
    setStAndSave(prev=>{
      let chk=prev.checking,sv=prev.savings;
      if(form.type==="DEPOSIT")chk+=amt;if(form.type==="WITHDRAWAL")chk-=amt;
      if(form.type==="XFER-OUT"){chk-=amt;sv+=amt;}if(form.type==="XFER-IN"){chk+=amt;sv-=amt;}
      const tx={id:prev.nextId,when:Date.now(),type:form.type,amount:amt,category:form.category||"UNCAT",note:form.note,postBalance:chk};
      return{...prev,checking:chk,savings:sv,nextId:prev.nextId+1,ledger:[...prev.ledger,tx],balanceHistory:[...prev.balanceHistory,chk].slice(-60)};
    });
    setForm({type:"DEPOSIT",amount:"",category:"INCOME",note:""});setFormErr("");notify("Transaction recorded!");setScreen("dashboard");
  };

  const exportCSV=()=>{
    const rows=["id,date,type,amount,balance,category,note",...st.ledger.map(tx=>`${tx.id},"${fFull(tx.when)}",${tx.type},${tx.amount.toFixed(2)},${tx.postBalance.toFixed(2)},"${tx.category}","${(tx.note||"").replace(/"/g,'\\"')}"`
    )];

        const lines=r.target.result.trim().split("\n");const imported=[];
        for(let i=1;i<lines.length;i++){const row=lines[i].match(/(".*?"|[^,]+)(?=,|$)/g)||[];const cl=v=>(v||"").replace(/^"|"$/g,"").trim();const amt=parseFloat(cl(row[3]))||0;if(amt>0)imported.push({id:parseInt(cl(row[0]))||i,when:new Date(cl(row[1])).getTime()||Date.now(),type:cl(row[2])||"WITHDRAWAL",amount:amt,postBalance:parseFloat(cl(row[4]))||0,category:(cl(row[5])||"UNCAT").toUpperCase(),note:cl(row[6])||""});}
        if(!imported.length){notify("No valid rows found.",false);return;}
        if(!window.confirm(`Import ${imported.length} transactions?`)){ev.target.value="";return;}
        pushUndo(st);setStAndSave(prev=>({...prev,checking:imported[imported.length-1].postBalance,nextId:imported.length+1,ledger:imported,balanceHistory:imported.map(t=>t.postBalance).slice(-60)}));
        notify(`Imported ${imported.length} transactions!`);setScreen("dashboard");

          syncing&&s({style:{color:"rgba(255,255,255,0.5)",fontSize:10,marginRight:4}},"☁"),
          b({onClick:()=>setShowTheme(p=>!p),style:{background:"rgba(0,0,0,0.3)",border:`1px solid ${T.accent}60`,color:"#fff",borderRadius:10,padding:"6px 12px",fontWeight:700,fontSize:11,cursor:"pointer"}},"🎨"),
          b({onClick:()=>window._fbSignOut&&window._fbSignOut(),style:{background:"rgba(0,0,0,0.3)",border:"1px solid rgba(255,255,255,0.2)",color:"rgba(255,255,255,0.7)",borderRadius:10,padding:"6px 10px",fontWeight:700,fontSize:10,cursor:"pointer"}},"Sign out")
        )
      ),
      d({style:{display:"flex",gap:8}},
        [["↩",undo,!undos.length,"Undo"],["↪",redo,!redos.length,"Redo"],["📥",exportCSV,false,"Export"],["📤",()=>document.getElementById("csvImport").click(),false,"Import"],["🗑",resetApp,false,"Reset"]].map(([ic,fn,dis,lb])=>
          b({key:lb,onClick:fn,disabled:dis,style:{flex:1,background:"rgba(0,0,0,0.28)",border:`1px solid rgba(255,255,255,${dis?0.1:0.3})`,color:dis?"rgba(255,255,255,0.25)":"#fff",borderRadius:9,padding:"6px 2px",fontWeight:700,fontSize:10,cursor:dis?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:3}},s({style:{fontSize:13}},ic),lb)
        )
      )
    ),

    // SIDE NAV (desktop)
    d({id:"sidenav",style:{background:T.panel}},
      d({style:{color:T.accent,fontWeight:900,fontSize:10,letterSpacing:"0.14em",padding:"4px 8px 10px"}},"NAVIGATION"),
      e(SideBtn,{id:"dashboard",icon:"🏠",label:"Home"}),
      e(SideBtn,{id:"ledger",icon:"📋",label:"Ledger"}),
      e(SideBtn,{id:"new-tx",icon:"➕",label:"New Transaction"}),
      e(SideBtn,{id:"analytics",icon:"📊",label:"Analytics"}),
      e(SideBtn,{id:"search",icon:"🔍",label:"Search"}),
      d({style:{flex:1}}),
      d({style:{borderTop:`1px solid ${T.border}30`,paddingTop:12,marginTop:12}},
        d({style:{color:T.muted,fontSize:10,padding:"0 8px 4px"}},"Signed in as"),
        d({style:{color:T.text,fontSize:12,fontWeight:700,padding:"0 8px 12px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},(user&&user.email)||""),
      )
    ),

    // MAIN (balance cards + content)
    d({id:"main"},
      showTheme&&d({style:{margin:"10px 14px 0",background:T.panel,borderRadius:16,padding:16,border:`1px solid ${T.border}60`}},
        d({style:{color:T.accent,fontWeight:900,fontSize:11,letterSpacing:"0.14em",marginBottom:10}},"SELECT THEME"),
        d({style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}},
          THEMES.map((th,i)=>b({key:i,onClick:()=>{setTid(i);setShowTheme(false);},style:{background:`linear-gradient(135deg,${th.h1},${th.h2})`,border:i===tid?"2.5px solid #fff":"1.5px solid transparent",borderRadius:10,padding:"8px 10px",color:"#fff",fontWeight:700,fontSize:12,cursor:"pointer",textAlign:"left"}},th.name))
        )
      ),
      d({id:"balcards",style:{display:"flex",gap:10,padding:"14px 14px 4px",flexWrap:"wrap"}},
        e(BalCard,{label:"Checking",value:st.checking,icon:"💳",color:T.good,t:T,spark:st.balanceHistory}),
        e(BalCard,{label:"Savings",value:st.savings,icon:"🏦",color:T.accent,t:T})
      ),
      d({id:"content"},SCREENS[screen]||SCREENS.dashboard)
    ),

    // BOTTOM NAV (mobile)
    d({id:"bottomnav",style:{background:T.panel,borderTop:`2px solid ${T.border}40`,boxShadow:"0 -4px 20px #00000080",paddingBottom:"env(safe-area-inset-bottom,0px)"}},
      e(NavBtn,{id:"dashboard",icon:"🏠",label:"Home"}),
      e(NavBtn,{id:"ledger",icon:"📋",label:"Ledger"}),
      e(NavBtn,{id:"new-tx",icon:"➕",label:"New"}),
      e(NavBtn,{id:"analytics",icon:"📊",label:"Analytics"}),
      e(NavBtn,{id:"search",icon:"🔍",label:"Search"})
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App,null));
})();
</script>
<script>
if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));}
</script>
<script>
(function(){
  function applyLayout(){
    const vw = window.innerWidth;
    const app = document.getElementById('app');
    const hdr = document.getElementById('header');
    if(!app) return;

    if(vw >= 600){
      const sw = Math.round(Math.min(260, Math.max(180, vw * 0.17)));
      const cp = Math.round(Math.min(60, Math.max(20, (vw - sw) * 0.03)));
      const hw = hdr ? hdr.getBoundingClientRect().height : 110;

      // Set CSS vars on root so grid columns see them
      const root = document.documentElement;
      root.style.setProperty('--sw', sw+'px');
      root.style.setProperty('--cp', cp+'px');
      root.style.setProperty('--hw', hw+'px');

      app.setAttribute('data-layout','desktop');
    } else {
      app.setAttribute('data-layout','mobile');
    }
  }

  applyLayout();
  window.addEventListener('resize', applyLayout);
  window.addEventListener('load', applyLayout);
  [50, 200, 500, 1000].forEach(t => setTimeout(applyLayout, t));
})();
</script>
